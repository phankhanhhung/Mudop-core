name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bmmdl
          POSTGRES_PASSWORD: bmmdl_dev_password
          POSTGRES_DB: bmmdl_registry
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore BMMDL.sln

    - name: Build
      run: dotnet build BMMDL.sln --no-restore --configuration Release

    - name: Run Unit Tests
      run: |
        dotnet test src/BMMDL.Tests/BMMDL.Tests.Unit.csproj \
          --no-build \
          --configuration Release \
          --filter "Category!=Integration&Category!=Database" \
          --logger "trx;LogFileName=unit-tests.trx" \
          --results-directory ./artifacts/test-results
      continue-on-error: false

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: ./artifacts/test-results/*.trx
        retention-days: 30

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: build-output
        path: |
          src/**/bin/Release/**/*.dll
          src/**/bin/Release/**/*.exe
        retention-days: 7
